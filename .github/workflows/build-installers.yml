name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  windows-installer:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pillow

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build Windows app
        shell: pwsh
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --windowed `
            --name "QingZhang" `
            --icon "packaging/windows/qingzhang.ico" `
            --add-data "ui;ui" `
            --add-data "core;core" `
            --hidden-import PySide6.QtCore `
            --hidden-import PySide6.QtGui `
            --hidden-import PySide6.QtWidgets `
            --hidden-import cryptography.fernet `
            --hidden-import matplotlib.backends.backend_qt5agg `
            --hidden-import pandas `
            --hidden-import openpyxl `
            --exclude-module PyQt5 `
            --exclude-module PyQt6 `
            --exclude-module qdarktheme `
            main.py

      - name: Build NSIS installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          $appSource = (Resolve-Path "dist/QingZhang").Path
          $outputFile = Join-Path (Resolve-Path "release").Path "QingZhang-v5.3-Setup.exe"
          & "C:\Program Files (x86)\NSIS\makensis.exe" "/DAPP_SOURCE_DIR=$appSource" "/DOUTPUT_FILE=$outputFile" packaging/windows/qingzhang.nsi

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: QingZhang-Windows-Installer-v5.3
          path: release/QingZhang-v5.3-Setup.exe

  macos-dmg:
    name: macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pillow

      - name: Build macOS app
        run: |
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --windowed \
            --name "清账" \
            --osx-bundle-identifier com.sc123667.qingzhang \
            --icon packaging/macos/qingzhang.icns \
            --add-data "ui:ui" \
            --add-data "core:core" \
            --hidden-import PySide6.QtCore \
            --hidden-import PySide6.QtGui \
            --hidden-import PySide6.QtWidgets \
            --hidden-import cryptography.fernet \
            --hidden-import matplotlib.backends.backend_qt5agg \
            --hidden-import pandas \
            --hidden-import openpyxl \
            --exclude-module PyQt5 \
            --exclude-module PyQt6 \
            --exclude-module qdarktheme \
            main.py

      - name: Build DMG
        run: |
          mkdir -p release build/dmg
          cp -R "dist/清账.app" build/dmg/
          ln -s /Applications build/dmg/Applications
          hdiutil create -volname "清账 v5.3" -srcfolder build/dmg -ov -format UDZO "release/清账-macOS-v5.3.dmg"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: QingZhang-macOS-DMG-v5.3
          path: release/清账-macOS-v5.3.dmg
